<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle de Nível — PID</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <main class="card">
    <div class="panel-left">
      <div class="panel-controls">
        <header class="header">
          <h1>Controle de Nível — PID</h1>
          <p id="status" class="status">Conectando…</p>
        </header>

        <section class="mode">
          <p class="control-title">Modo de operação</p>
          <div class="mode-toggle" role="tablist">
            <button id="modeManual" class="mode-btn active" type="button" role="tab" aria-selected="true">Manual</button>
            <button id="modeAuto" class="mode-btn" type="button" role="tab" aria-selected="false">Auto</button>
          </div>
        </section>

        <section class="mode alarm-section">
          <div class="alarm-head">
            <p class="control-title">Alarme sonoro</p>
            <div class="mode-toggle" role="group" aria-label="Alarme sonoro">
              <button id="alarmOn" class="mode-btn active" type="button" aria-pressed="true">Ligado</button>
              <button id="alarmOff" class="mode-btn" type="button" aria-pressed="false">Desligado</button>
            </div>
          </div>
          <div class="alarm-status">
            <span class="readout-label">Alerta</span>
            <span id="buzValue" class="alert-dot" role="status" aria-label="Alarme inativo"></span>
          </div>
          <p class="hint alarm-hint">Alerta a ≤ 2 cm do fundo ou do topo.</p>
        </section>

        <section class="control">
          <div class="control-head">
            <p class="control-title">Setpoint</p>
            <span class="control-value"><span id="setpointValue">0.0</span> cm</span>
          </div>
          <input type="range" id="setpoint" class="slider" min="0" max="15" step="0.1" value="0">
        </section>

        <section id="manualSection" class="control">
          <div class="control-head">
            <p class="control-title">Bomba PWM (manual)</p>
            <span class="control-value"><span id="manualPwm">0</span> %</span>
          </div>
          <input type="range" id="slider1" class="slider" min="0" max="100" step="1" value="0">
        </section>

        <section class="pid-section">
          <p class="control-title">Ganhos PID</p>
          <div class="pid-grid">
            <label>
              <span>Kp</span>
              <input type="number" id="kp" step="0.1" value="5.0" inputmode="decimal">
            </label>
            <label>
              <span>Ki</span>
              <input type="number" id="ki" step="0.1" value="0.5" inputmode="decimal">
            </label>
            <label>
              <span>Kd</span>
              <input type="number" id="kd" step="0.1" value="0.0" inputmode="decimal">
            </label>
            <label>
              <span>α filtro</span>
              <input type="number" id="alpha" step="0.05" min="0.05" max="1" value="0.3" inputmode="decimal">
            </label>
          </div>
        </section>
      </div>

      <div class="panel-readouts">
        <section class="readout readout--compact">
          <div class="readout-item">
            <span class="readout-label">Nível</span>
            <span class="readout-value"><span id="levelValue">--</span> <small>cm</small></span>
          </div>
          <div class="readout-item">
            <span class="readout-label">PWM bomba</span>
            <span class="readout-value"><span id="pwmValue">0</span> <small>%</small></span>
          </div>
        </section>
      </div>
    </div>

    <div class="panel-chart">
      <section class="chart-section">
        <div class="chart-header">
          <span class="legend"><span class="dot dot-level"></span>Nível</span>
          <span class="legend"><span class="dot dot-sp"></span>Setpoint</span>
          <span class="legend"><span class="dot dot-pwm"></span>PWM bomba</span>
          <span class="legend legend--err"><span class="dot dot-err"></span>Erro %</span>
          <span class="legend-meta">Janela: 180 s</span>
        </div>
        <canvas id="chart" class="chart"></canvas>
      </section>
    </div>
  </main>
  <script src="script.js?v=181"></script>
</body>
</html>
